# CecilIA v2 — Sistema de IA para Control Fiscal
# Contraloría General de la República de Colombia
#
# Archivo: alembic.ini
# Propósito: Configuración de Alembic para migraciones de base de datos
# Sprint: 0
# Autor: Equipo Técnico CecilIA — CD-TIC-CGR
# Fecha: Abril 2026

[alembic]
# Ruta al directorio de migraciones
script_location = alembic

# Plantilla para nombres de archivos de migración
# file_template = %%(rev)s_%%(slug)s

# Zona horaria para marcas de tiempo en migraciones
# timezone =

# Truncar slug largo generado desde el mensaje de revisión
# truncate_slug_length = 40

# Definir si se incluye el campo 'create_date' en el script de migración
# output_encoding = utf-8

# La URL de la base de datos se obtiene desde variables de entorno
# en alembic/env.py para no exponer credenciales en este archivo
# sqlalchemy.url = driver://user:pass@localhost/dbname

# Configuración de logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generico

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generico

[formatter_generico]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
