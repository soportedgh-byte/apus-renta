# ============================================================================
# CecilIA v2 — Sistema de IA para Control Fiscal
# Contraloría General de la República de Colombia
#
# Archivo : cecilia.conf
# Propósito: Configuración de Nginx como proxy inverso — frontend, API y WebSocket
# Sprint  : 0
# Autor   : Equipo Técnico CecilIA — CD-TIC-CGR
# Fecha   : Abril 2026
# ============================================================================

# ---------------------------------------------------------------------------
# Rate limiting: zona compartida para limitar solicitudes por IP
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=cecilia_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=cecilia_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=cecilia_auth:10m rate=5r/m;

# ---------------------------------------------------------------------------
# Upstream: servicios backend
# ---------------------------------------------------------------------------
upstream backend_api {
    server backend:8000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:3000;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# Redirigir HTTP a HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name cecilia.contraloria.gov.co;

    # Permitir verificación de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirigir todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Servidor HTTPS principal
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cecilia.contraloria.gov.co;

    # --- Certificados SSL (Let's Encrypt) ---
    # NOTA: Reemplazar con las rutas reales tras ejecutar certbot
    ssl_certificate     /etc/letsencrypt/live/cecilia.contraloria.gov.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cecilia.contraloria.gov.co/privkey.pem;

    # --- Parámetros SSL ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Cabeceras de seguridad ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss://$host; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Ocultar versión de Nginx ---
    server_tokens off;

    # --- Tamaño máximo de carga ---
    client_max_body_size 50M;

    # --- Compresión Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Logs ---
    access_log /var/log/nginx/cecilia_access.log;
    error_log  /var/log/nginx/cecilia_error.log warn;

    # -----------------------------------------------------------------------
    # API REST: /api/
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=cecilia_api burst=20 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }

    # -----------------------------------------------------------------------
    # Endpoint de autenticación: rate limiting estricto
    # -----------------------------------------------------------------------
    location /api/v1/auth/login {
        limit_req zone=cecilia_auth burst=3 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # WebSocket: /api/ws/
    # -----------------------------------------------------------------------
    location /api/ws/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        # Cabeceras necesarias para WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts más largos para WebSocket
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Deshabilitar buffering para WebSocket
        proxy_buffering off;
    }

    # -----------------------------------------------------------------------
    # Health check del backend (sin rate limiting)
    # -----------------------------------------------------------------------
    location = /api/v1/health {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Frontend: Next.js
    # -----------------------------------------------------------------------
    location / {
        limit_req zone=cecilia_general burst=50 nodelay;

        proxy_pass http://frontend_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # -----------------------------------------------------------------------
    # Archivos estáticos del frontend (cache agresivo)
    # -----------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Favicon y recursos estáticos
    # -----------------------------------------------------------------------
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Denegar acceso a archivos ocultos
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
